# Local Seed stack for Knowledge Manager agent.
#
# Two services:
#   - seed-daemon: the Go peer (P2P, gRPC, low-level HTTP). Built from
#     backend/cmd/seed-daemon/Dockerfile, image seedhypermedia/site:latest.
#     Stores everything under /data; uses a file-based keystore so it can
#     run headless inside the container.
#   - seed-web:    the Remix frontend that exposes the `/api/<RPC>` surface
#     used by `seed-cli`, the desktop app, and the website. Image
#     seedhypermedia/web:latest. Talks to the daemon via DAEMON_HTTP_URL.
#
# The agent's seed-cli on the host points to seed-web (port 3000), NOT
# directly to the daemon, because the daemon's HTTP server only exposes
# raw gRPC-Web, while seed-cli speaks the Remix `/api/<RPC>` JSON shape.

networks:
  seed-net:
    driver: bridge

services:
  seed-daemon:
    image: seedhypermedia/site:latest
    container_name: km-seed-daemon
    restart: unless-stopped
    networks: [seed-net]
    ports:
      # HTTP + gRPC bound to loopback only — only the local web container
      # and curl-based debug calls from the host should reach them.
      - "127.0.0.1:55001:55001"
      - "127.0.0.1:55002:55002"
      # P2P port reachable from the public internet.
      - "55000:55000/tcp"
      - "55000:55000/udp"
    volumes:
      - ./data:/data
    environment:
      - SEED_LOG_LEVEL=info
    command:
      - seed-daemon
      - -data-dir=/data
      - -keystore-dir=/data/keys
      - -http.port=55001
      - -grpc.port=55002
      - -p2p.port=55000
      - -syncing.smart=true

  seed-web:
    image: seedhypermedia/web:latest
    container_name: km-seed-web
    restart: unless-stopped
    networks: [seed-net]
    depends_on:
      - seed-daemon
    ports:
      # Bound to loopback — seed-cli on the host hits this on 127.0.0.1:3000.
      - "127.0.0.1:3000:3000"
    volumes:
      - ./web-data:/data
    environment:
      - PORT=3000
      - DATA_DIR=/data
      - DAEMON_HTTP_URL=http://seed-daemon:55001
      - SEED_BASE_URL=http://127.0.0.1:3000
      - SEED_IS_GATEWAY=false
