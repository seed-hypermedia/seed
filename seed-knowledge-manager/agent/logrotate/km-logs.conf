# User-mode logrotate config for the Knowledge Manager agent.
# Install path: /home/km/.config/logrotate.d/km-logs.conf
# Wired to a user-systemd timer (km-logrotate.timer) that runs daily.

/home/km/km-logs/runs/*/trace.jsonl
/home/km/km-logs/runs/*/llm.jsonl
/home/km/km-logs/runs/*/tools.jsonl
/home/km/km-logs/runs/*/seed-cli.jsonl
/home/km/km-logs/runs/*/stdout.log
/home/km/km-logs/runs/*/stderr.log
{
    daily
    rotate 30
    maxsize 100M
    missingok
    notifempty
    compress
    delaycompress
    nocopytruncate
    su km km
}

# Top-level summary index.
/home/km/km-logs/index.jsonl {
    yearly
    rotate 5
    missingok
    notifempty
    compress
    delaycompress
    nocopytruncate
    su km km
}
