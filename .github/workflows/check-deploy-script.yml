name: Deploy Script - Check & Build

on:
  workflow_call:
  pull_request:
    paths:
      - 'ops/**'
      - '.github/workflows/check-deploy-script.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install
        working-directory: ops

      - name: Typecheck
        run: bun run typecheck
        working-directory: ops

      - name: Test
        run: bun test
        working-directory: ops

      - name: Build bundle
        run: bun run build
        working-directory: ops

      - name: Verify dist/deploy.js is up to date
        working-directory: ops
        run: |
          if ! git diff --quiet dist/deploy.js 2>/dev/null; then
            echo "::error::ops/dist/deploy.js is stale. Run 'bun run build' in ops/ and commit the result."
            exit 1
          fi

      - name: Upload deploy.js artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-script
          path: ops/dist/deploy.js
          retention-days: 7
