name: Frontend Tests (Parallel)

on:
  workflow_call:
    inputs:
      run-integration-tests:
        description: "Whether to run integration tests (web-related)"
        required: false
        type: boolean
        default: true

  pull_request:
    paths:
      - ".github/workflows/test-frontend-parallel.yml"
      - "frontend/**"
    branches-ignore:
      - "renovate/**"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      test_web: ${{ steps.compute.outputs.test_web }}
      test_shared: ${{ steps.compute.outputs.test_shared }}
      test_desktop: ${{ steps.compute.outputs.test_desktop }}
      run_e2e_editor: ${{ steps.compute.outputs.run_e2e_editor }}
      run_integration: ${{ steps.compute.outputs.run_integration }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'frontend/packages/shared/**'
            client:
              - 'frontend/packages/client/**'
            ui:
              - 'frontend/packages/ui/**'
            editor:
              - 'frontend/packages/editor/**'
            web:
              - 'frontend/apps/web/**'
            desktop:
              - 'frontend/apps/desktop/**'
            workflow:
              - '.github/workflows/test-frontend-parallel.yml'

      - name: Compute affected test suites
        id: compute
        run: |
          shared="${{ steps.filter.outputs.shared }}"
          client="${{ steps.filter.outputs.client }}"
          ui="${{ steps.filter.outputs.ui }}"
          editor="${{ steps.filter.outputs.editor }}"
          web="${{ steps.filter.outputs.web }}"
          desktop="${{ steps.filter.outputs.desktop }}"
          workflow="${{ steps.filter.outputs.workflow }}"

          echo "Filter results: shared=$shared client=$client ui=$ui editor=$editor web=$web desktop=$desktop workflow=$workflow"

          # client or workflow change -> run everything
          run_all="false"
          if [ "$client" = "true" ] || [ "$workflow" = "true" ]; then
            run_all="true"
          fi

          # web depends on: editor, ui, shared, client
          test_web="false"
          if [ "$run_all" = "true" ] || [ "$web" = "true" ] || [ "$ui" = "true" ] || [ "$editor" = "true" ] || [ "$shared" = "true" ]; then
            test_web="true"
          fi

          # shared has its own tests
          test_shared="false"
          if [ "$run_all" = "true" ] || [ "$shared" = "true" ]; then
            test_shared="true"
          fi

          # desktop depends on: shared, client
          test_desktop="false"
          if [ "$run_all" = "true" ] || [ "$desktop" = "true" ] || [ "$shared" = "true" ]; then
            test_desktop="true"
          fi

          # editor E2E depends on: editor, ui, shared, client
          run_e2e_editor="false"
          if [ "$run_all" = "true" ] || [ "$editor" = "true" ] || [ "$ui" = "true" ] || [ "$shared" = "true" ]; then
            run_e2e_editor="true"
          fi

          # integration tests (full web app): same deps as web
          run_integration="false"
          if [ "$run_all" = "true" ] || [ "$web" = "true" ] || [ "$ui" = "true" ] || [ "$editor" = "true" ] || [ "$shared" = "true" ]; then
            run_integration="true"
          fi

          echo "Results: test_web=$test_web test_shared=$test_shared test_desktop=$test_desktop run_e2e_editor=$run_e2e_editor run_integration=$run_integration"

          echo "test_web=$test_web" >> "$GITHUB_OUTPUT"
          echo "test_shared=$test_shared" >> "$GITHUB_OUTPUT"
          echo "test_desktop=$test_desktop" >> "$GITHUB_OUTPUT"
          echo "run_e2e_editor=$run_e2e_editor" >> "$GITHUB_OUTPUT"
          echo "run_integration=$run_integration" >> "$GITHUB_OUTPUT"

  # Job 1: All unit tests together (fast)
  unit-tests:
    name: Unit Tests
    needs: [detect-changes]
    # Always run (typecheck + format are fast and catch issues everywhere).
    # !cancelled() ensures this runs even when detect-changes is skipped (workflow_call).
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for new TypeScript directives
        run: node scripts/check-ts-directives.mjs

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Validate Code Formatting
        run: pnpm format:check

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run Web Unit tests
        if: |
          github.event_name != 'pull_request' ||
          needs.detect-changes.result == 'failure' ||
          needs.detect-changes.outputs.test_web == 'true'
        run: pnpm --filter @shm/web test

      - name: Run Shared Unit Tests
        if: |
          github.event_name != 'pull_request' ||
          needs.detect-changes.result == 'failure' ||
          needs.detect-changes.outputs.test_shared == 'true'
        run: pnpm --filter @shm/shared test

      - name: Run Desktop Unit Tests
        if: |
          github.event_name != 'pull_request' ||
          needs.detect-changes.result == 'failure' ||
          needs.detect-changes.outputs.test_desktop == 'true'
        id: desktop_tests
        timeout-minutes: 3
        continue-on-error: true
        run: |
          pnpm --filter @shm/desktop test:unit
          echo "VITEST_EXIT_CODE=$?" > /tmp/desktop-tests-status

      - name: Verify Desktop Tests Passed
        if: steps.desktop_tests.outcome != 'success'
        run: |
          if [ -f /tmp/desktop-tests-status ]; then
            echo "❌ Desktop tests failed (vitest exited with error)"
            cat /tmp/desktop-tests-status
            exit 1
          fi
          echo "✅ Desktop tests passed (vitest hung after completion — known jsdom issue)"

  # Job 2: Integration tests (only for docker workflows)
  integration-tests:
    needs: [detect-changes]
    if: |
      !cancelled() &&
      (github.event_name != 'workflow_call' || inputs.run-integration-tests) &&
      (
        needs.detect-changes.result != 'success' ||
        needs.detect-changes.outputs.run_integration == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"
      - name: Install dependencies
        run: pnpm install
      - name: Install build dependencies
        run: sudo apt-get install -y cmake
      - name: Cache GGUF model
        uses: actions/cache@v4
        with:
          path: backend/llm/backends/llamacpp/models/*.gguf
          key: gguf-model-granite-v2
          enableCrossOsArchive: true
      - name: Download GGUF model
        run: |
          if [ ! -f backend/llm/backends/llamacpp/models/granite-embedding-107m-multilingual-Q8_0.gguf ]; then
            mkdir -p backend/llm/backends/llamacpp/models
            curl -fSL -o backend/llm/backends/llamacpp/models/granite-embedding-107m-multilingual-Q8_0.gguf \
              "https://huggingface.co/keisuke-miyako/granite-embedding-107m-multilingual-gguf-q8_0/resolve/main/granite-embedding-107m-multilingual-Q8_0.gguf?download=true"
          fi
      - name: Build llama.cpp (CPU-only)
        run: |
          cd backend/util/llama-go
          CMAKE_ARGS="-DBUILD_SHARED_LIBS=OFF -DGGML_VULKAN=OFF -DGGML_METAL=OFF -DGGML_CUDA=OFF -DGGML_HIP=OFF -DGGML_SYCL=OFF -DGGML_BLAS=OFF" make libbinding.a
      - name: Build daemon binary
        run: |
          mkdir -p plz-out/bin/backend
          go build -tags cpu -o plz-out/bin/backend/seed-daemon-x86_64-unknown-linux-gnu ./backend/cmd/seed-daemon
        env:
          CGO_ENABLED: "1"
          LIBRARY_PATH: ${{ github.workspace }}/backend/util/llama-go
          C_INCLUDE_PATH: ${{ github.workspace }}/backend/util/llama-go
      - name: Build web app
        run: pnpm web:prod
      - name: Install Playwright browsers
        run: cd tests && pnpm test:install-browsers
      - name: Run integration tests
        run: cd tests && pnpm test

  # Job 3: E2E tests (desktop and editor in parallel)
  e2e-tests:
    name: E2E Tests - ${{ matrix.suite }}
    needs: [detect-changes]
    if: |
      !cancelled() && (
        needs.detect-changes.result != 'success' ||
        needs.detect-changes.outputs.run_e2e_editor == 'true'
      )
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [desktop, editor]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: |
          if [ "${{ matrix.suite }}" == "desktop" ]; then
            echo 'SKIP DESKTOP E2E FOR NOW.'
            # cd frontend/apps/desktop && pnpm exec playwright install chromium --with-deps
          else
            cd frontend/packages/editor && pnpm exec playwright install chromium --with-deps
          fi

      - name: Run E2E tests
        run: |
          if [ "${{ matrix.suite }}" == "desktop" ]; then
            echo 'SKIP DESKTOP E2E FOR NOW.'
            # pnpm desktop:test
          else
            xvfb-run --auto-servernum --server-args='-screen 0, 1920x1080x24' pnpm --filter @shm/editor test:e2e
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.suite }}-results
          path: |
            frontend/apps/${{ matrix.suite }}/test-results/
            frontend/apps/${{ matrix.suite }}/playwright-report/
            frontend/packages/${{ matrix.suite }}/test-results/
            frontend/packages/${{ matrix.suite }}/playwright-report/

  # Final check: all tests must pass
  all-tests-passed:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]
    # needs: [unit-tests, integration-tests]
    if: always()
    steps:
      - name: Check test results
        run: |
          # Check unit tests (always run)
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "Unit tests failed!"
            exit 1
          fi

          # Check integration tests (must succeed or be skipped)
          result="${{ needs.integration-tests.result }}"
          if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
            echo "Integration tests failed!"
            exit 1
          fi

          # Check E2E tests (must succeed or be skipped)
          # if [ "${{ needs.e2e-tests.result }}" != "success" ] && [ "${{ needs.e2e-tests.result }}" != "skipped" ]; then
          #   echo "E2E tests failed!"
          #   exit 1
          # fi

          echo "All tests passed!"
