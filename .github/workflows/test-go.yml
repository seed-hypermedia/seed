name: Test Go

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/test-go.yml"
      - "go.mod"
      - "backend/**"

  pull_request:
    paths:
      - ".github/workflows/test-go.yml"
      - "go.mod"
      - "backend/**"
    branches-ignore:
      - "renovate/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ vulkan-headers libvulkan-dev glslc

      - name: Build llama.cpp
        run: |
          cd backend/util/llama-go
          BUILD_TYPE=vulkan CMAKE_ARGS="-DBUILD_SHARED_LIBS=OFF" make libbinding.a

      - name: Run tests
        run: go test -tags vulkan --count 1 ./backend/...
        env:
          CGO_ENABLED: 1
          CGO_LDFLAGS: "-lggml-vulkan -lvulkan"
          LIBRARY_PATH: ${{ github.workspace }}/backend/util/llama-go
          C_INCLUDE_PATH: ${{ github.workspace }}/backend/util/llama-go

      # Run tests again with the race-detector.
      # Using the same job to reuse the build cache.
      - name: Run tests with race detector
        run: go test -tags vulkan --count 1 -race ./backend/...
        env:
          CGO_ENABLED: 1
          CGO_LDFLAGS: "-lggml-vulkan -lvulkan"
          LIBRARY_PATH: ${{ github.workspace }}/backend/util/llama-go
          C_INCLUDE_PATH: ${{ github.workspace }}/backend/util/llama-go
