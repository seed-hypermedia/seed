name: Release - Desktop App (Unified)

permissions:
  contents: write

on:
  # Manual trigger only - no automatic tag-based releases
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        type: choice
        options:
          - dev
          - stable
        default: "dev"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.channel || 'stable' }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1

jobs:
  calculate-version:
    runs-on: ubuntu-latest
    # Add environment protection for stable releases
    environment: ${{ inputs.channel == 'stable' && 'production' || 'development' }}
    outputs:
      version: ${{ steps.set_version.outputs.version }}
      channel: ${{ steps.set_channel.outputs.channel }}
      is_stable: ${{ steps.set_channel.outputs.is_stable }}

    steps:
      - name: Validate stable channel restrictions
        if: ${{ inputs.channel == 'stable' && github.ref != 'refs/heads/main' }}
        run: |
          echo "❌ ERROR: Stable releases can only be triggered from the main branch!"
          echo "Current branch: ${{ github.ref }}"
          echo "Required branch: refs/heads/main"
          echo ""
          echo "Please switch to the main branch before triggering a stable release."
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for version calculation

      - name: Determine Channel
        id: set_channel
        run: |
          CHANNEL="${{ inputs.channel }}"
          IS_STABLE=$([ "$CHANNEL" == "stable" ] && echo "true" || echo "false")
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "is_stable=$IS_STABLE" >> $GITHUB_OUTPUT
          echo "📦 Channel: $CHANNEL (is_stable=$IS_STABLE)"

          # Log branch information
          echo "🌿 Current branch: ${{ github.ref }}"
          if [ "$IS_STABLE" == "true" ]; then
            echo "✅ Stable release from main branch"
          fi

      - name: Calculate Version
        id: set_version
        run: |
          CHANNEL="${{ steps.set_channel.outputs.channel }}"

          # Calculate version based on channel
          echo "Calculating version for channel: $CHANNEL"
          VERSION=$(node scripts/generate-version.mjs --channel=$CHANNEL)

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo ""
          echo "✅ Calculated version: $VERSION"

  frontend-tests:
    runs-on: ubuntu-latest
    needs: [calculate-version]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for new TypeScript directives
        run: node scripts/check-ts-directives.mjs

      - name: Install dependencies
        run: yarn install

      - name: Validate Code Formatting
        run: yarn format:check

      - name: Validate TypeScript
        run: yarn typecheck

      - name: Run tests
        run: yarn test

  build-binaries:
    timeout-minutes: 30
    name: Build ${{ matrix.config.os }} @ ${{ matrix.config.arch }}
    runs-on: ${{ matrix.config.os }}
    needs: [calculate-version, frontend-tests]
    strategy:
      matrix:
        config:
          - os: macos-13-large
            arch: x64
            goarch: amd64
            daemon_name: x86_64-apple-darwin
          - os: macos-13-xlarge
            arch: arm64
            goarch: arm64
            daemon_name: aarch64-apple-darwin
          - os: ubuntu-latest
            arch: x64
            goarch: amd64
            daemon_name: x86_64-unknown-linux-gnu
          - os: windows-2025
            arch: x64
            goarch: amd64
            daemon_name: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/ci-setup
        with:
          matrix-os: ${{ matrix.config.os }}

      - name: Build Backend (Unix)
        if: matrix.config.os != 'windows-2025'
        run: |
          mkdir -p plz-out/bin/backend
          go build -o plz-out/bin/backend/seed-daemon-${{ matrix.config.daemon_name }} ./backend/cmd/seed-daemon
        env:
          GOARCH: ${{ matrix.config.goarch }}
          CGO_ENABLED: 1

      - name: Build Backend (Windows)
        if: startsWith(matrix.config.os, 'windows')
        run: |
          mkdir -p plz-out/bin/backend
          go build -o plz-out/bin/backend/seed-daemon-${{ matrix.config.daemon_name }}.exe ./backend/cmd/seed-daemon
        env:
          GOOS: "windows"
          GOARCH: ${{ matrix.config.goarch }}
          CGO_ENABLED: 1

      - name: Set MacOS signing certs
        if: startsWith(matrix.config.os, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p $APPLE_KEYCHAIN_PASSWORD build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p $APPLE_KEYCHAIN_PASSWORD build.keychain
          security import certificate.p12 -k build.keychain -P $APPLE_CERTIFICATE_PASSWORD -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k $APPLE_KEYCHAIN_PASSWORD build.keychain
          rm -fr *.p12
          security set-keychain-settings -lut 1200

      - name: Set temporal version in package.json
        run: |
          node scripts/set-desktop-version.mjs
        env:
          VITE_VERSION: "${{ needs.calculate-version.outputs.version }}"

      - name: Build, package & make (Unix)
        if: matrix.config.os != 'windows-2025'
        run: |
          yarn desktop:make --arch=${{ matrix.config.arch }}
        env:
          timeout-minutes: 10
          DEBUG: electron-*
          NODE_OPTIONS: --max_old_space_size=4096
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          DAEMON_NAME: ${{ matrix.config.daemon_name }}
          VITE_VERSION: "${{ needs.calculate-version.outputs.version }}"
          VITE_COMMIT_HASH: "${{ github.sha }}"
          VITE_DESKTOP_P2P_PORT: "56000"
          VITE_DESKTOP_HTTP_PORT: "56001"
          VITE_DESKTOP_GRPC_PORT: "56002"
          VITE_METRIC_SERVER_HTTP_PORT: "56003"
          VITE_DESKTOP_APPDATA: "Seed"
          VITE_DESKTOP_HOSTNAME: "http://localhost"
          VITE_LIGHTNING_API_URL: "https://ln.seed.hyper.media"
          VITE_GATEWAY_URL: "https://hyper.media"
          VITE_DESKTOP_SENTRY_DSN: "${{ secrets.DESKTOP_SENTRY_DSN }}"
          VITE_SEED_HOST_URL: "https://host.seed.hyper.media"
          SENTRY_AUTH_TOKEN: "${{ secrets.SENTRY_AUTH_TOKEN }}"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build, package and make (Win32)
        if: startsWith(matrix.config.os, 'windows')
        run: |
          yarn desktop:make --arch=${{ matrix.config.arch }}
        env:
          timeout-minutes: 10
          DEBUG: electron-*
          NODE_OPTIONS: --max_old_space_size=4096
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          DAEMON_NAME: "${{ matrix.config.daemon_name }}.exe"
          VITE_VERSION: "${{ needs.calculate-version.outputs.version }}"
          VITE_COMMIT_HASH: "${{ github.sha }}"
          VITE_DESKTOP_P2P_PORT: "56000"
          VITE_DESKTOP_HTTP_PORT: "56001"
          VITE_DESKTOP_GRPC_PORT: "56002"
          VITE_METRIC_SERVER_HTTP_PORT: "56003"
          VITE_DESKTOP_APPDATA: "Seed"
          VITE_DESKTOP_HOSTNAME: "http://localhost"
          VITE_LIGHTNING_API_URL: "https://ln.seed.hyper.media"
          VITE_GATEWAY_URL: "https://hyper.media"
          VITE_DESKTOP_SENTRY_DSN: "${{ secrets.DESKTOP_SENTRY_DSN }}"
          VITE_SEED_HOST_URL: "https://host.seed.hyper.media"
          SENTRY_AUTH_TOKEN: "${{ secrets.SENTRY_AUTH_TOKEN }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.config.daemon_name }}
          path: frontend/apps/desktop/out/make/**/*

  # MIGRATION ONLY: Publish to OLD S3 location for existing stable users
  # This job can be removed after users migrate to the new version
  publish-migration-to-old-s3:
    needs: [calculate-version, build-binaries]
    runs-on: ubuntu-latest
    if: needs.calculate-version.outputs.channel == 'stable'
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Configure AWS Credentials (eu-west-2)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2  # OLD bucket is in eu-west-2

      - name: Publish to OLD S3 location (migration support)
        run: |
          VERSION="${{ needs.calculate-version.outputs.version }}"

          echo "📦 MIGRATION: Publishing to OLD S3 location for existing users"
          echo "  Bucket: s3://seedappdev/prod/"
          echo "  Version: $VERSION"
          echo ""
          echo "  ⚠️  This is temporary for migration support"
          echo "  ⚠️  Remove this job after users update to new version"

          # Publish to old prod location for existing stable users
          aws s3 sync artifacts/ s3://seedappdev/prod/latest/ \
            --exclude "*.blockmap" \
            --acl public-read

          echo "✅ Published to OLD S3 location (migration)"

      - name: Generate and upload latest.json to OLD location
        run: |
          VERSION="${{ needs.calculate-version.outputs.version }}"

          # Generate latest.json
          node scripts/generate-prod-latest.js \
            --channel=stable \
            --version=$VERSION > latest.json

          # Upload to OLD S3 location
          aws s3 cp latest.json s3://seedappdev/prod/latest.json \
            --acl public-read \
            --content-type "application/json"

          echo "✅ Uploaded latest.json to OLD location (migration)"

  # Metadata uploads for dev channel only
  # (stable latest.json is handled by desktop-prod-latest-json-to-s3.yml on release)
  publish-dev-metadata:
    needs: [calculate-version, build-binaries]
    runs-on: ubuntu-latest
    if: needs.calculate-version.outputs.channel == 'dev'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate and upload latest.json (dev channel)
        run: |
          VERSION="${{ needs.calculate-version.outputs.version }}"

          echo "📝 Generating latest.json for dev channel"
          echo "  Version: $VERSION"

          # Generate latest.json
          node scripts/generate-prod-latest.js \
            --channel=dev \
            --version=$VERSION > latest.json

          # Upload to NEW S3 location
          aws s3 cp latest.json s3://seedreleases/dev/latest/latest.json \
            --acl public-read \
            --content-type "application/json"

          echo "✅ Uploaded latest.json for dev channel"

      - name: Generate and upload RELEASES.json (dev channel)
        run: |
          VERSION="${{ needs.calculate-version.outputs.version }}"

          # Create RELEASES.json with current version
          echo "{\"currentRelease\": \"$VERSION\"}" > RELEASES.json

          # Upload to NEW S3 location
          aws s3 cp RELEASES.json s3://seedreleases/dev/latest/RELEASES.json \
            --acl public-read \
            --content-type "application/json"

          echo "✅ Uploaded RELEASES.json for dev channel"

  publish-to-github:
    needs: [calculate-version, build-binaries]
    runs-on: ubuntu-latest
    if: needs.calculate-version.outputs.is_stable == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Git Tag
        run: |
          VERSION="${{ needs.calculate-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create annotated tag
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

          echo "✅ Created and pushed tag: $VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          tag_name: "${{ needs.calculate-version.outputs.version }}"
          name: "Release ${{ needs.calculate-version.outputs.version }}"
          prerelease: true
          generate_release_notes: true
          files: ./artifacts/artifacts-*/**/*
          body: |
            ## 📦 Downloads

            **Channel:** stable
            **Version:** ${{ needs.calculate-version.outputs.version }}

            Binaries are also available on S3:
            - Download URL: https://seedreleases.s3.amazonaws.com/stable/latest/
            - Archive: https://seedreleases.s3.amazonaws.com/stable/archive/${{ needs.calculate-version.outputs.version }}/

            🤖 Auto-generated release notes below:

  summary:
    needs: [calculate-version, build-binaries, publish-dev-metadata, publish-migration-to-old-s3, publish-to-github]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Release Summary
        run: |
          echo "## 🎉 Release Complete"
          echo ""
          echo "**Channel:** ${{ needs.calculate-version.outputs.channel }}"
          echo "**Version:** ${{ needs.calculate-version.outputs.version }}"
          echo ""
          echo "### 📦 Published to:"
          echo "- ✅ S3 NEW: s3://seedreleases/${{ needs.calculate-version.outputs.channel }}/latest/ (via Forge)"
          echo "- ✅ S3 Archive: s3://seedreleases/${{ needs.calculate-version.outputs.channel }}/archive/${{ needs.calculate-version.outputs.version }}/ (via Forge)"

          if [ "${{ needs.calculate-version.outputs.is_stable }}" == "true" ]; then
            echo "- ✅ S3 OLD: s3://seedappdev/prod/latest/ (migration support)"
            echo "- ✅ GitHub Release (prerelease)"
          else
            echo "- ⏭️  GitHub Release (skipped for dev channel)"
            echo "- ⏭️  OLD S3 location (skipped for dev channel)"
          fi
