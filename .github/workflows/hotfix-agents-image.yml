name: Hotfix - Agents Docker Image

# Manually-run hotfix release for the hosted agents service ONLY.
# Builds agents/Dockerfile from main and pushes seedhypermedia/agents:latest —
# the production tag served at agentic.seed.hyper.media (watchtower on the
# agentic host auto-deploys it after push).
# For a full production release of all images, use release-docker-images.yml.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Require main branch
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::This workflow publishes the production 'latest' tag and must be run from main (got ${GITHUB_REF})."
            exit 1
          fi

  agents-tests:
    runs-on: ubuntu-latest
    needs: [guard]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # test/check/build match the gate used by the release and dev image
        # workflows; docker and trigger add the deeper smoke tests (image boot
        # + real-daemon trigger path) since this workflow ships straight to prod.
        task: [test, check, build, docker, trigger]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: agents-bun-${{ runner.os }}-${{ hashFiles('agents/bun.lock') }}
          restore-keys: |
            agents-bun-${{ runner.os }}-
      - name: Install dependencies
        working-directory: agents
        run: bun install --frozen-lockfile
      - name: Run ${{ matrix.task }}
        working-directory: agents
        run: |
          case "${{ matrix.task }}" in
            test) bun test ;;
            check) bun run check ;;
            build) bun run test:build ;;
            docker) bun run test:docker ;;
            trigger) bun run test:trigger ;;
          esac

  docker-agents:
    runs-on: ubuntu-latest
    needs: [agents-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get commit date
        run: echo "COMMIT_DATE=$(git show -s --format="%cd" ${{ github.sha }})" >> "$GITHUB_ENV"

      - name: DockerHub Release seedhypermedia/agents:latest
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          file: agents/Dockerfile
          tags: seedhypermedia/agents:latest
          build-args: |
            VERSION=latest
            COMMIT_HASH=${{ github.sha }}
            BRANCH=${{ github.ref }}
            DATE=${{ env.COMMIT_DATE }}
          # Shares the build cache with the full release workflow so hotfix
          # builds stay fast and bit-consistent with regular releases.
          cache-from: type=gha,scope=docker-agents-release
          cache-to: type=gha,mode=max,scope=docker-agents-release
