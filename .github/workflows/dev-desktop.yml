name: Dev - Desktop App

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    # Run at 8:00 AM UTC on every weekday (Monday through Friday)
    - cron: '0 8 * * 1-5'
  push:
    branches:
      - feat/flatpak

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1

jobs:
  build-info:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Version
        id: set_version
        run: |
          node scripts/generate-dev-version.mjs --debug
          VERSION=$(node scripts/generate-dev-version.mjs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Display Version
        run: |
          echo "App Version: ${{ steps.set_version.outputs.version }}"

  # Build and validate deploy script (fail-fast before expensive builds)
  deploy-script:
    uses: ./.github/workflows/check-deploy-script.yml

  # Use the reusable parallel test workflow
  frontend-tests:
    needs: [build-info]
    uses: ./.github/workflows/test-frontend-parallel.yml
    with:
      run-integration-tests: false

  build-binaries:
    timeout-minutes: 30
    name: Build ${{ matrix.config.os }} @ ${{ matrix.config.arch }}
    runs-on: ${{ matrix.config.os }}
    # if: startsWith(github.ref, 'refs/tags/')
    needs: [build-info, frontend-tests, deploy-script]
    strategy:
      matrix:
        config:
          - os: macos-15-large
            arch: x64
            goarch: amd64
            daemon_name: x86_64-apple-darwin
          - os: macos-15-xlarge
            arch: arm64
            goarch: arm64
            daemon_name: aarch64-apple-darwin
          - os: ubuntu-latest
            arch: x64
            goarch: amd64
            daemon_name: x86_64-unknown-linux-gnu
          - os: windows-2025
            arch: x64
            goarch: amd64
            daemon_name: x86_64-pc-windows-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache GGUF model
        uses: actions/cache@v4
        with:
          path: backend/llm/backends/llamacpp/models/*.gguf
          key: gguf-model-granite-v2
          enableCrossOsArchive: true

      - name: Download GGUF model (Unix)
        if: matrix.config.os != 'windows-2025'
        run: |
          if [ ! -f backend/llm/backends/llamacpp/models/granite-embedding-107m-multilingual-Q8_0.gguf ]; then
            mkdir -p backend/llm/backends/llamacpp/models
            curl -fSL -o backend/llm/backends/llamacpp/models/granite-embedding-107m-multilingual-Q8_0.gguf \
              "https://huggingface.co/keisuke-miyako/granite-embedding-107m-multilingual-gguf-q8_0/resolve/main/granite-embedding-107m-multilingual-Q8_0.gguf?download=true"
          fi

      - name: Download GGUF model (Windows)
        if: startsWith(matrix.config.os, 'windows')
        shell: pwsh
        run: |
          $modelPath = "backend/llm/backends/llamacpp/models/granite-embedding-107m-multilingual-Q8_0.gguf"
          if (-not (Test-Path $modelPath)) {
            New-Item -ItemType Directory -Force -Path "backend/llm/backends/llamacpp/models"
            Invoke-WebRequest -Uri "https://huggingface.co/keisuke-miyako/granite-embedding-107m-multilingual-gguf-q8_0/resolve/main/granite-embedding-107m-multilingual-Q8_0.gguf?download=true" -OutFile $modelPath
          }

      - uses: ./.github/actions/ci-setup
        with:
          matrix-os: ${{ matrix.config.os }}
          # matrix-target: ${{ matrix.config.daemon_name }}
          # matrix-arch: ${{ matrix.config.arch }}

      - name: Build Backend (Unix)
        if: matrix.config.os != 'windows-2025'
        run: |
          mkdir -p plz-out/bin/backend
          # GPU is enabled by default (no -tags needed)
          go build -o plz-out/bin/backend/seed-daemon-${{ matrix.config.daemon_name }} ./backend/cmd/seed-daemon
        env:
          GOARCH: ${{ matrix.config.goarch }}
          CGO_ENABLED: 1
          MACOSX_DEPLOYMENT_TARGET: '13.0'
          LIBRARY_PATH: ${{ github.workspace }}/backend/util/llama-go
          C_INCLUDE_PATH: ${{ github.workspace }}/backend/util/llama-go

      - name: Build Backend (Windows)
        if: matrix.config.os == 'windows-2025'
        shell: bash
        run: |
          mkdir -p plz-out/bin/backend
          # GPU is enabled by default (no -tags needed)
          go build -o plz-out/bin/backend/seed-daemon-${{ matrix.config.daemon_name }}.exe ./backend/cmd/seed-daemon
        env:
          GOOS: 'windows'
          GOARCH: ${{ matrix.config.goarch }}
          CGO_ENABLED: 1
          CGO_LDFLAGS: -static-libgcc -static-libstdc++
          LIBRARY_PATH: ${{ github.workspace }}/backend/util/llama-go
          C_INCLUDE_PATH: ${{ github.workspace }}/backend/util/llama-go

      - name: Stage Windows runtime DLL
        if: matrix.config.os == 'windows-2025'
        shell: bash
        run: |
          set -euo pipefail
          DLL_PATH="$(gcc -print-file-name=libwinpthread-1.dll)"

          if [ ! -f "$DLL_PATH" ]; then
            echo "ERROR: libwinpthread-1.dll not found in gcc toolchain"
            exit 1
          fi

          cp "$DLL_PATH" plz-out/bin/backend/libwinpthread-1.dll
          ls -la plz-out/bin/backend/libwinpthread-1.dll

      - name: Verify Windows daemon runtime deps
        if: matrix.config.os == 'windows-2025'
        shell: bash
        run: |
          set -euo pipefail
          BIN="plz-out/bin/backend/seed-daemon-${{ matrix.config.daemon_name }}.exe"

          if ! command -v objdump >/dev/null 2>&1; then
            echo "objdump not available on runner; skipping dependency check"
            exit 0
          fi

          DLLS="$(objdump -p "$BIN" | awk '/DLL Name:/ {print $3}')"
          echo "Windows DLL imports:"
          echo "$DLLS"

          if echo "$DLLS" | grep -Eiq '^(libstdc\+\+-6\.dll|libgcc_s_seh-1\.dll|libgomp-1\.dll)$'; then
            echo "ERROR: MinGW runtime DLL dependency is still present"
            exit 1
          fi

          if echo "$DLLS" | grep -Eiq '^libwinpthread-1\.dll$'; then
            if [ ! -f "plz-out/bin/backend/libwinpthread-1.dll" ]; then
              echo "ERROR: daemon imports libwinpthread-1.dll but runtime DLL is not staged"
              exit 1
            fi

            echo "libwinpthread-1.dll import detected and staged correctly"
          fi

      - name: Set MacOS signing certs
        if: startsWith(matrix.config.os, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p $APPLE_KEYCHAIN_PASSWORD build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p $APPLE_KEYCHAIN_PASSWORD build.keychain
          security import certificate.p12 -k build.keychain -P $APPLE_CERTIFICATE_PASSWORD -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k $APPLE_KEYCHAIN_PASSWORD build.keychain
          rm -fr *.p12
          security set-keychain-settings -lut 1200 # prevent the keychain to get locked before codesign is done

      - name: Set temporal version in package.json
        run: |
          node scripts/set-desktop-version.mjs
        env:
          VITE_VERSION: '${{ needs.build-info.outputs.version }}'
      - name: Build, package & make (Unix)
        if: matrix.config.os != 'windows-2025'
        run: |
          pnpm desktop:publish --arch=${{ matrix.config.arch }}
        env:
          timeout-minutes: 10
          DEBUG: electron-*,electron-installer-flatpak*,@malept/flatpak-bundler
          NODE_OPTIONS: --max_old_space_size=4096
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          FLATPAK_BUILDER_VERBOSE: '1'
          DAEMON_NAME: ${{ matrix.config.daemon_name }}
          VITE_VERSION: '${{ needs.build-info.outputs.version }}'
          VITE_COMMIT_HASH: '${{ github.sha }}'
          VITE_DESKTOP_P2P_PORT: '57000'
          VITE_DESKTOP_HTTP_PORT: '57001'
          VITE_DESKTOP_GRPC_PORT: '57002'
          VITE_METRIC_SERVER_HTTP_PORT: '57003'
          VITE_DESKTOP_APPDATA: 'Seed-dev'
          VITE_DESKTOP_HOSTNAME: 'http://localhost'
          VITE_LIGHTNING_API_URL: 'https://ln.testnet.seed.hyper.media'
          VITE_SEED_HOST_URL: 'https://host-dev.seed.hyper.media'
          VITE_GATEWAY_URL: 'https://dev.hyper.media'
          VITE_NOTIFY_SERVICE_HOST: 'https://notify-dev.seed.hyper.media'
          VITE_DESKTOP_SENTRY_DSN: '${{ secrets.DESKTOP_SENTRY_DSN }}'
          SENTRY_AUTH_TOKEN: '${{ secrets.SENTRY_AUTH_TOKEN }}'
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SEED_P2P_TESTNET_NAME: 'dev'

      - name: Clean up problematic RELEASES file (Windows)
        if: startsWith(matrix.config.os, 'windows')
        shell: bash
        run: |
          # Clean up .nupkg files from S3 to force a fresh start
          aws s3 rm s3://seedappdev/dev/win32/x64/ --recursive --exclude "*" --include "*.nupkg" || echo "No .nupkg files found, continuing..."
          # Create an empty RELEASES file
          touch RELEASES
          aws s3 cp RELEASES s3://seedappdev/dev/win32/x64/RELEASES || echo "Failed to upload empty RELEASES file, continuing..."
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: eu-west-2

      - name: Ensure 7-Zip is in PATH (Windows)
        if: startsWith(matrix.config.os, 'windows')
        shell: powershell
        run: |
          # Squirrel.Windows needs 7z.exe for CreateZipFromDirectory
          if (Test-Path "C:\Program Files\7-Zip") {
            echo "C:\Program Files\7-Zip" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "Added 7-Zip to PATH"
          } else {
            choco install 7zip -y
            echo "C:\Program Files\7-Zip" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "Installed and added 7-Zip to PATH"
          }

      - name: Build, package and make (Win32)
        if: startsWith(matrix.config.os, 'windows')
        shell: powershell
        run: |
          # Clear any existing out directory to force a clean build
          if (Test-Path "frontend/apps/desktop/out") { Remove-Item -Recurse -Force "frontend/apps/desktop/out" }
          pnpm desktop:publish --arch=${{ matrix.config.arch }}
        env:
          timeout-minutes: 10
          DEBUG: electron-*
          NODE_OPTIONS: --max_old_space_size=4096
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          DAEMON_NAME: '${{ matrix.config.daemon_name }}.exe'
          VITE_VERSION: '${{ needs.build-info.outputs.version }}'
          VITE_COMMIT_HASH: '${{ github.sha }}'
          VITE_DESKTOP_P2P_PORT: '57000'
          VITE_DESKTOP_HTTP_PORT: '57001'
          VITE_DESKTOP_GRPC_PORT: '57002'
          VITE_METRIC_SERVER_HTTP_PORT: '57003'
          VITE_DESKTOP_APPDATA: 'Seed-dev'
          VITE_DESKTOP_HOSTNAME: 'http://localhost'
          VITE_LIGHTNING_API_URL: 'https://ln.testnet.seed.hyper.media'
          VITE_SEED_HOST_URL: 'https://host-dev.seed.hyper.media'
          VITE_GATEWAY_URL: 'https://dev.hyper.media'
          VITE_NOTIFY_SERVICE_HOST: 'https://notify-dev.seed.hyper.media'
          VITE_DESKTOP_SENTRY_DSN: '${{ secrets.DESKTOP_SENTRY_DSN }}'
          SENTRY_AUTH_TOKEN: '${{ secrets.SENTRY_AUTH_TOKEN }}'
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: eu-west-2
          SEED_P2P_TESTNET_NAME: 'dev'

      - name: Sign Windows application (DigiCert KeyLocker)
        if: startsWith(matrix.config.os, 'windows')
        uses: digicert/code-signing-software-trust-action@v1.0.0
        env:
          SM_API_KEY: ${{ secrets.KEYLOCKER_API_KEY }}
          SM_CLIENT_CERT_FILE_B64: ${{ secrets.KEYLOCKER_CERT }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.KEYLOCKER_CERT_PASSWORD }}
        with:
          keypair-alias: ${{ secrets.KEYLOCKER_KEYPAIR_ALIAS }}
          input: frontend/apps/desktop/out/make
          simple-signing-mode: true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.config.daemon_name }}
          path: frontend/apps/desktop/out/make/**/*

  notify-on-discord:
    needs: [build-info, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Step 3: Generate artifact URLs and send to Discord
      - name: Send Discord Notification
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ needs.build-info.outputs.version }}
        run: |
          # Debug: List all files in artifacts directory
          echo "Listing all files in artifacts directory:"
          find artifacts -type f -ls

          # Get the GitHub Action Run URL base
          BASE_URL="https://seedappdev.s3.eu-west-2.amazonaws.com/dev/latest"

          # # Performance dashboard URL
          # DASHBOARD_URL="https://seedappdev.s3.eu-west-2.amazonaws.com/performance-dashboard/latest/index.html"

          # List all artifacts and construct URLs
          MESSAGE="**New dev version: ${VERSION}**"
          for file in $(find artifacts -type f); do
            FILE_NAME=$(basename "$file")
            ARTIFACT_URL="${BASE_URL}/${FILE_NAME}"
            MESSAGE="${MESSAGE}\n - [${FILE_NAME}](${ARTIFACT_URL})"
          done

          # # Add performance dashboard link
          # MESSAGE="${MESSAGE}\n\n**[View Performance Dashboard](${DASHBOARD_URL})**"
          # MESSAGE="${MESSAGE}\n(Performance results for this build will be available in the dashboard soon)"

          # Send the message to Discord
          echo "Sending Discord Notification..."
          PAYLOAD=$(printf '{"content": "%s"}' "$MESSAGE")
          curl -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"

      - name: Generate and upload latest.json (Dev)
        env:
          VERSION: ${{ needs.build-info.outputs.version }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: eu-west-2
        run: |
          # Create the JSON structure
          cat > latest.json << EOF
          {
            "name": "${VERSION}",
            "tag_name": "${VERSION}",
            "release_notes": "Development build ${VERSION}",
            "assets": {
              "linux": {
                "deb": {
                  "download_url": "https://seedappdev.s3.eu-west-2.amazonaws.com/dev/latest/seed-dev_${VERSION}_amd64.deb"
                },
                "rpm": {
                  "download_url": "https://seedappdev.s3.eu-west-2.amazonaws.com/dev/latest/seed-dev-${VERSION}-1.x86_64.rpm"
                },
                "app_image": {
                  "download_url": "https://seedappdev.s3.eu-west-2.amazonaws.com/dev/latest/SeedDev-${VERSION}-x64.AppImage"
                },
                "flatpak": {
                  "download_url": "https://seedappdev.s3.eu-west-2.amazonaws.com/dev/latest/com.seed.app.dev_stable_x86_64.flatpak"
                }
              },
              "macos": {
                "x64": {
                  "download_url": "https://seedappdev.s3.eu-west-2.amazonaws.com/dev/latest/SeedDev-${VERSION}-x64.dmg",
                  "zip_url": "https://seedappdev.s3.eu-west-2.amazonaws.com/dev/latest/SeedDev-darwin-x64-${VERSION}.zip"
                },
                "arm64": {
                  "download_url": "https://seedappdev.s3.eu-west-2.amazonaws.com/dev/latest/SeedDev-${VERSION}-arm64.dmg",
                  "zip_url": "https://seedappdev.s3.eu-west-2.amazonaws.com/dev/latest/SeedDev-darwin-arm64-${VERSION}.zip"
                }
              },
              "win32": {
                "x64": {
                  "download_url": "https://seedappdev.s3.eu-west-2.amazonaws.com/dev/latest/seed-dev-${VERSION}-win32-x64-setup.exe",
                  "nupkg_url": "https://seedappdev.s3.eu-west-2.amazonaws.com/dev/latest/seed-dev-${VERSION}-full.nupkg",
                  "release_url": "https://seedappdev.s3.eu-west-2.amazonaws.com/dev/latest/RELEASES"
                }
              }
            }
          }
          EOF

          # Upload to S3
          aws s3 cp latest.json s3://seedappdev/dev/latest.json

      - name: Upload deploy.js to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: eu-west-2
        run: |
          aws s3 cp artifacts/deploy-script/deploy.js s3://seedappdev/dev/latest/deploy.js
