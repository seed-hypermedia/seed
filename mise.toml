min_version = "2025.12.12"

[tools]
"conda:coreutils" = "9.5"
go = "1.25.4"
"go:github.com/thought-machine/please/src" = {"version" = "648d330599c4a96e46ec7aa9bca5839119b04a4c", postinstall = "mv $MISE_TOOL_INSTALL_PATH/bin/src $MISE_TOOL_INSTALL_PATH/bin/plz"}
node = "22.2.0"
protoc = "24.4"
yarn = "4.12.0"

[settings]
experimental = true

[env]
_.file = ".env"

# System packages needed for llama.cpp build:
# 
# Linux (Vulkan backend):
#   Fedora/RHEL: sudo dnf install vulkan-headers vulkan-loader-devel glslang gcc-c++ cmake
#   Ubuntu/Debian: sudo apt install libvulkan-dev vulkan-tools glslc g++ cmake
# 
# macOS (Metal backend):
#   Metal framework is built-in with Xcode Command Line Tools
#   Install Xcode Command Line Tools: xcode-select --install
#   No additional packages required - Metal is part of the macOS SDK
