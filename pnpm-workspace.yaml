packages:
  - 'frontend/apps/*'
  - 'frontend/packages/*'
  - 'frontend/scripts'
  - 'docs'
  - 'tests'

# Supply-chain security settings — https://pnpm.io/supply-chain-security

# Delays installation of newly-published package versions by 24 h. This gives
# the security ecosystem time to detect compromised releases before they reach
# the project. Only affects `pnpm add` / version updates; `pnpm install` from
# an existing lockfile (frozen) is unaffected.
minimumReleaseAge: 1440

# trustPolicy: "no-downgrade"
# Blocks installation if a package's trust level has decreased compared to its
# previous release (e.g. was provenance-attested, now unsigned).
# DISABLED: too many packages in the current dependency tree have legitimately
# changed their publishing workflow (e.g. semver, vite, hosted-git-info,
# undici-types) — pnpm flags these as trust downgrades even when they are not
# supply-chain incidents. Re-enable once the dep tree stabilises or when pnpm
# adds a way to bulk-accept historical workflow changes.

# Ignore CVEs that have no upstream fix available.
# Re-evaluate periodically — remove once a patched version is released.
