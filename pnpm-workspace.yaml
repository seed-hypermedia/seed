packages:
  - 'frontend/apps/*'
  - 'frontend/packages/*'
  - 'frontend/scripts'
  - 'docs'
  - 'tests'

# Supply-chain security settings — https://pnpm.io/supply-chain-security

# Delays installation of newly-published package versions by 24 h. This gives
# the security ecosystem time to detect compromised releases before they reach
# the project. Only affects `pnpm add` / version updates; `pnpm install` from
# an existing lockfile (frozen) is unaffected.
minimumReleaseAge: 1440

# trustPolicy: "no-downgrade"
# Blocks installation if a package's trust level has decreased compared to its
# previous release (e.g. was provenance-attested, now unsigned).
# DISABLED: too many packages in the current dependency tree have legitimately
# changed their publishing workflow (e.g. semver, vite, hosted-git-info,
# undici-types) — pnpm flags these as trust downgrades even when they are not
# supply-chain incidents. Re-enable once the dep tree stabilises or when pnpm
# adds a way to bulk-accept historical workflow changes.

# Ignore CVEs that have no upstream fix available.
# Re-evaluate periodically — remove once a patched version is released.
auditConfig:
  ignoreCves:
    # ip@<=2.0.1 — Server-Side Request Forgery — no patch published.
    # Reaches us via: lighthouse > puppeteer-core > ... > ip
    # and react-devtools > ip (both are devDependencies only).
    - CVE-2024-29415
    # html-minifier@<=4.0.0 — ReDoS — no patch published.
    # Reaches us via: mjml > mjml-cli > html-minifier (emails app devDep).
    - CVE-2022-37620

# blockExoticSubdeps: true
# Prevents transitive dependencies from being resolved from exotic sources
# (git repositories, direct tarball URLs). All transitive deps must come
# from the configured registry.
# BLOCKED: @electron/node-gyp is resolved from a git repo as a transitive dep
# of @electron-forge/shared-types → @electron/rebuild@3.7.2. Needs an upstream
# fix in @electron-forge before this can be enabled.

# TypeScript settings — https://pnpm.io/typescript
#
# @types/* version pinning
# In a pnpm workspace, multiple packages can end up pulling different versions of
# the same @types/* package (e.g. @types/react), causing TypeScript to fail to
# resolve types correctly. The recommended fix is either:
#   (a) packageExtensions — declare the missing peerDependency on the culprit package, or
#   (b) @pnpm/plugin-types-fixer — automates option (a) across the workspace
# We use approach (c): pnpm.overrides in package.json to pin @types/react and
# @types/react-dom workspace-wide. This is a valid alternative and keeps all packages
# on a single, consistent set of type definitions.
# Pinned versions: @types/react@18.2.64, @types/react-dom@18.2.21 (see package.json).
#
# preserveSymlinks
# Never set "preserveSymlinks": true in any tsconfig.json when using pnpm.
# TypeScript cannot resolve type dependencies correctly through pnpm's symlinked
# node_modules with that option enabled. If you ever need symlink preservation for
# Node.js runtime behaviour, set pnpm's nodeLinker to "hoisted" instead.
