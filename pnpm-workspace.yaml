packages:
  - 'frontend/apps/*'
  - 'frontend/packages/*'
  - 'frontend/scripts'
  - 'docs'
  - 'tests'

# Supply-chain security settings — https://pnpm.io/supply-chain-security

# Delays installation of newly-published package versions by 24 h. This gives
# the security ecosystem time to detect compromised releases before they reach
# the project. Only affects `pnpm add` / version updates; `pnpm install` from
# an existing lockfile (frozen) is unaffected.
minimumReleaseAge: "1440 minutes"

# Blocks installation if a package's trust level has decreased compared to its
# previous release (e.g. was provenance-attested, now unsigned).
trustPolicy: "no-downgrade"
trustPolicyExclude:
  # undici-types@6.21.0 (transitive dep of @types/node) lacks provenance
  # attestation that earlier versions had. Excluded pending upstream resolution.
  # See: https://github.com/seed-hypermedia/seed/pull/310 for context.
  - "undici-types"

# blockExoticSubdeps: true
# Prevents transitive dependencies from being resolved from exotic sources
# (git repositories, direct tarball URLs). All transitive deps must come
# from the configured registry.
# BLOCKED: @electron/node-gyp is resolved from a git repo as a transitive dep
# of @electron-forge/shared-types → @electron/rebuild@3.7.2. Needs an upstream
# fix in @electron-forge before this can be enabled.
