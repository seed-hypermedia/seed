syntax = "proto3";

package com.seed.documents.v3alpha;

import "documents/v3alpha/documents.proto";
import "documents/v3alpha/comments.proto";
import "google/protobuf/timestamp.proto";
import "p2p/v1alpha/syncing.proto";

option go_package = "seed/backend/genproto/documents/v3alpha;documents";

// Service for querying Hypermedia resources.
//
// Note: This API had to be separate to avoid circular dependencies between documents and comments.
service Resources {
  // Gets a single resource with a URL (technically IRI).
  rpc GetResource(GetResourceRequest) returns (Resource);

  // Triggers a best-effort discovery of a resource.
  rpc DiscoverResource(DiscoverResourceRequest) returns (DiscoverResourceResponse);

  // Finds the list of local resources matching the input string.
  rpc SearchResources(SearchResourcesRequest) returns (SearchResourcesResponse);

  // Lists citations of a given resource across the locally-available content.
  rpc ListCitations(ListCitationsRequest) returns (ListCitationsResponse);

  // Makes sure a resource (and their related blobs) are pushed to a given peer.
  rpc PushResourcesToPeer(PushResourcesToPeerRequest) returns (stream com.seed.p2p.v1alpha.AnnounceBlobsProgress);
}

// Request to get a single resource by its IRI.
message GetResourceRequest {
  // Required. IRI of the resource to retrieve.
  string iri = 1;
}

// An identifiable entity, accessible with a unique identifier.
message Resource {
  // Various kinds of resources.
  oneof kind {
    Document document = 1;

    Comment comment = 2;

    Contact contact = 3;
  }

  // Optional. The version of the resource (when applicable).
  string version = 4;
}

message PushResourcesToPeerRequest {
  // A list of multiaddrs for the same peer ID to attempt p2p connection.
  // For example `/ip4/10.0.0.1/tcp/55000/p2p/QmDeadBeef`.
  repeated string addrs = 1;

  // Required. Resource IRIs to push. We will also push
  // related blobs to those resources. No wilcards are supported.
  // Only documents resources can be specified. No single comments supported yet.
  // See https://seedteamtalks.hyper.media/projects/daemon-pushing-algo
  repeated string resources = 2;

  // Optional. Whether to push children documents recursively as well.
  bool recursive = 3;
}

// Request to list citations of a resource.
message ListCitationsRequest {
  // Required. IRI of the cited resource.
  string iri = 1;

  // Optional. The size of the page to return by the server.
  // The server may ignore this, and return a bigger response.
  int32 page_size = 2;

  // Optional. The page token to continue the pagination.
  string page_token = 3;

  // Optional. Whether to return the results in descending order (newest-first).
  // By default citations are listed in the chronological order,
  // according to the *locally perceived* order of the blobs that contain the citations.
  //
  // I.e. we sort the links according to the time we receive the blobs, not according to the time blobs claim to have been created.
  // This is to prevent losing new citations in case of receiving out-of-date blobs.
  //
  // This flag must remain the same when paginating through the results.
  bool reverse_order = 4;
}

// Response to list citations of a resource.
message ListCitationsResponse {
  // Required. The list of citations for the resource.
  repeated Citation citations = 1;

  // Optional. Token for the next page if there's any.
  string next_page_token = 2;
}

// Citation of a resource.
// Source means the place where the citation was found.
// Target means the resource being cited.
message Citation {
  // Information about a structural blob that contains the citation.
  message BlobInfo {
    // The CID-formatted hash of the blob.
    string cid = 1;

    // The Account ID of the author of the blob.
    string author = 2;

    // The timestamp of the blob.
    google.protobuf.Timestamp create_time = 3;
  }

  // Required. The source blob where the citation was found.
  string source = 1;

  // Required. The type of the source where the citation was found.
  string source_type = 2;

  // Required. Context can mean different things depending on the type of the source:
  // it can be the block ID when source type is a Document or Comment.
  string source_context = 3;

  // Required. Information about the blob where the citation was found.
  BlobInfo source_blob = 4;

  // Required. Specifies whether the link points to the exact/pinned version of the target document,
  // or if the target version is a *suggested* minimum version, and a later one should be preferred if exists.
  bool is_exact_version = 5;

  // Optional. Specifies the document where the citation was found. Relevant for comments.
  string source_document = 6;

  // Optional. The target resource the link points to.
  string target = 10;

  // Optional. The version of the target resource the link points to.
  string target_version = 7;

  // Optional. The fragment portion of the link.
  string target_fragment = 8;

  // Optional. The revision of the target block at target_version, when target_fragment
  // points to a block or text range.
  string target_block_revision = 11;

  // Optional. The type of citation. Could be embed, link, ...
  string citation_type = 9;
}


// Request to discover a resource.
//
// The discovery target is specified EITHER by `id` (preferred — single hm:// URL,
// suitable as a dedup key for clients that aggregate concurrent discovery requests)
// OR by the decomposed `account` + `path` pair (with optional `recursive`).
// Setting both forms in the same request is an error.
message DiscoverResourceRequest {
  // The hm:// URL identifying the discovery target. Mutually exclusive with
  // `account` + `path` + `recursive`.
  //
  // Examples — exact path:
  //   "hm://ACCOUNT_ID"                   — everything at account root
  //   "hm://ACCOUNT_ID/notes/foo"         — everything at /notes/foo
  // Examples — wildcards (must be the final path segment):
  //   "hm://ACCOUNT_ID/notes/*"           — direct children of /notes only
  //   "hm://ACCOUNT_ID/notes/**"          — /notes and everything under it
  //   "hm://ACCOUNT_ID/**"                — entire account
  // Examples — scope keyword (suffix on the last path segment):
  //   "hm://ACCOUNT_ID/:profile"          — profile blobs at account root
  //   "hm://ACCOUNT_ID/notes/foo:profile" — profile blobs at /notes/foo
  //
  // Wildcards and scope keywords are mutually exclusive in a single URL.
  // Reserved (not yet implemented): "/path:directory".
  string id = 5;

  // The account the resource belongs to. Mutually exclusive with `id`.
  string account = 1;

  // The path of the wanted resource. Mutually exclusive with `id`.
  string path = 2;

  // Optional. Version of the resource to discover.
  string version = 3;

  // Optional. If true, we sync the document and the child documents as well.
  // Mutually exclusive with `id` — when using `id`, encode recursion via the
  // `**` suffix instead. Prefer the `id` form for new callers.
  bool recursive = 4;
}

// Describes the state of the discovery task.
enum DiscoveryTaskState {
  // The task has just started.
  DISCOVERY_TASK_STARTED = 0;

  // The task is in progess — we keep looking for peers who can provide the content,
  // and downloading the content we are finding.
  DISCOVERY_TASK_IN_PROGRESS = 1;

  // The task has completed and the result is cached for the duration of the duration of the TTL.
  DISCOVERY_TASK_COMPLETED = 2;
}

// Response to discover a resource.
message DiscoverResourceResponse {
  // The cached version of the document we've discovered within the last discovery process.
  string version = 1;

  // The state of the discovery task.
  DiscoveryTaskState state = 2;

  // Deprecated field.
  reserved 3;

  // The timestamp of the last result we've found.
  // It can be empty if the discovery is still in progress.
  google.protobuf.Timestamp last_result_time = 4;

  // The cached error message of the last discovery attempt if it failed.
  string last_error = 5;

  // The time when the currently cached result will expire, and a new discovery attempt will be made,
  // if the client keeps calling the discovery RPC.
  // Can be empty if no results have been found yet.
  google.protobuf.Timestamp result_expire_time = 6;

  // The progress of the discovery process.
  DiscoveryProgress progress = 7;
}

// Various metrics reporting on the progress of the discovery process.
message DiscoveryProgress {
  // Number of peers we have found so far.
  int32 peers_found = 1;

  // Number of peers we have successfully synced with.
  int32 peers_synced_ok = 2;

  // Number of peers we have failed to sync with.
  int32 peers_failed = 3;

  // Number of blobs we have discovered so far.
  int32 blobs_discovered = 4;

  // Number of blobs we have successfully downloaded.
  int32 blobs_downloaded = 5;

  // Number of blobs we have failed to download.
  int32 blobs_failed = 6;
}

// A resource record found
message ResourceSearchResult {
  // IRI of the resource, including version, block id and range
  string id = 1;

  // Blob Id of the resource containing the matching record.
  string blob_id = 2;

  // The time of the version of the resource.
  google.protobuf.Timestamp version_time = 3;

  // In the case of comments, the document id
  // containing the comment.
  string doc_id = 4;

  // Content of the resource, depending on the type:
  // Alias in the case of account.
  // Title/Body in the case of groups and documents.
  // Body in the case of comments. We don't fill up the whole
  // block, just the part that contains the search term, with
  // the surrounding context. The context size is defined by
  // the context_size parameter.
  string content = 5;

  // The owner of the resource
  string owner = 6;

  // The type of the resource it coud be Title, Document, Comment, ...
  string type = 7;

  // Icon of the document containing that resource
  string icon = 8;

  // Parent document names
  repeated string parent_names = 9;

  // Metadata of the document containing that resource.
  string metadata = 10;
}

// Describes the state of the discovery task.
enum SearchType {
  // Keyword-based search.
  SEARCH_KEYWORD = 0;

  // Semantic search.
  SEARCH_SEMANTIC = 1;

  // Hybrid search. with RRFusion.
  SEARCH_HYBRID = 2;
}

// Content type to filter search results by.
enum ContentTypeFilter {
  CONTENT_TYPE_TITLE = 0;
  CONTENT_TYPE_DOCUMENT = 1;
  CONTENT_TYPE_COMMENT = 2;
  CONTENT_TYPE_CONTACT = 3;
}

// Request to search resources.
message SearchResourcesRequest {
  // Query to find. We support wildcards and phrases.
  // See https://sqlite.org/fts5.html#full_text_query_syntax.
  string query = 1;

  // Deprecated, use content_type_filters instead to specify
  // which content types to include in the search.
  bool include_body = 2 [deprecated = true];

  // Optional. The size of the text accompanying the search match.
  // Half of the size is before the match, and half after.
  // Default is 48 runes.
  int32 context_size = 3;

  // Deprecated. Use iri_filter instead.
  string account_uid = 4 [deprecated = true];

  // Optional. The account uid the user is logged in with.
  // This is used to filter out contacts that the user doesn't have access to.
  // If not set, we won't provide any contact resources in the response.
  string logged_account_uid = 5;

  // Optional. Type of search to perform. Could be keyword, semantic or hybrid.
  // if not set, keyword search is used.
  SearchType search_type = 6;

  // Optional. hm:// URL with optional GLOB wildcards to scope search.
  // Examples: "hm://<account>/cars/honda" (single doc), "hm://<account>/cars/*" (subtree).
  // When empty, falls back to account_uid if set, otherwise matches all.
  string iri_filter = 7;

  // Optional. Fine-grained content type selection. Overrides include_body when set.
  // When empty, legacy behavior (title + body types based on include_body).
  repeated ContentTypeFilter content_type_filter = 8;

  // Optional. Authority weight for citation-based ranking. Range [0, 1].
  // 0 (default) disables authority scoring. Higher values increase citation influence.
  // Final score: (1-weight)*textRRF + 0.7*weight*docAuthRRF + 0.3*weight*authorAuthRRF.
  float authority_weight = 9;

  // Optional. Maximum number of results per page.
  // When 0 (default), all results are returned (backwards compatible).
  int32 page_size = 10;

  // Optional. Token from a previous SearchResourcesResponse to get the next page.
  string page_token = 11;
}

// A list of resources matching the request.
message SearchResourcesResponse {
  // Resources matching the input title
  repeated ResourceSearchResult resources = 1;

  // Token for the next page if there's any.
  string next_page_token = 2;
}
