syntax = "proto3";

package com.seed.daemon.v1alpha;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "seed/backend/genproto/daemon/v1alpha;daemon";

// Daemon API allows to control and administer the Seed Daemon.
service Daemon {
  // Generates a set of BIP-39-compatible mnemonic words encoding a cryptographic seed.
  // This is a stateless call, and the generated mnemonic is not stored anywhere.
  // Subsequent call to RegisterKey can be used to register a new signing key derived from the mnemonic.
  rpc GenMnemonic(GenMnemonicRequest) returns (GenMnemonicResponse);

  // After generating the seed, this call is used to commit the seed and
  // create an account binding between the device and account.
  rpc RegisterKey(RegisterKeyRequest) returns (NamedKey);

  // Imports an existing signing key from a .hmkey.json file on disk.
  rpc ImportKey(ImportKeyRequest) returns (NamedKey);

  // Exports an existing signing key to a .hmkey.json file on disk.
  rpc ExportKey(ExportKeyRequest) returns (google.protobuf.Empty);

  // Get generic information about the running node.
  rpc GetInfo(GetInfoRequest) returns (Info);

  // Authenticates a caller key and returns a daemon bearer token.
  rpc Authenticate(AuthenticateRequest) returns (AuthenticateResponse);

  // Gets the current local-vault backend and sync status.
  rpc GetVaultStatus(GetVaultStatusRequest) returns (GetVaultStatusResponse);

  // Starts a browser-mediated remote vault connection flow.
  rpc StartVaultConnection(StartVaultConnectionRequest) returns (StartVaultConnectionResponse);

  // Disconnects the daemon from remote vault sync and falls back to local-only mode.
  rpc DisconnectVault(DisconnectVaultRequest) returns (google.protobuf.Empty);

  // Force-trigger periodic background sync of Seed objects.
  rpc ForceSync(ForceSyncRequest) returns (google.protobuf.Empty);

  // Gets the current email address of the connected remote vault user.
  rpc GetVaultEmail(GetVaultEmailRequest) returns (GetVaultEmailResponse);

  // Starts changing the remote vault user's email address. Sends a verification
  // code to the new email and returns an opaque binding to pass to verify.
  rpc ChangeVaultEmailStart(ChangeVaultEmailStartRequest) returns (ChangeVaultEmailStartResponse);

  // Completes a remote vault email change by verifying the emailed code.
  rpc ChangeVaultEmailVerify(ChangeVaultEmailVerifyRequest) returns (ChangeVaultEmailVerifyResponse);

  // Reports whether the connected remote vault user has a master password set.
  rpc GetVaultPasswordStatus(GetVaultPasswordStatusRequest) returns (GetVaultPasswordStatusResponse);

  // Sets or changes the connected remote vault user's master password. The
  // daemon derives the credential from the in-daemon DEK; the plaintext password
  // is never sent to the vault server.
  rpc SetVaultMasterPassword(SetVaultMasterPasswordRequest) returns (SetVaultMasterPasswordResponse);

  // Gets the notification server URL stored in the (synced) vault state.
  rpc GetVaultNotificationServer(GetVaultNotificationServerRequest) returns (GetVaultNotificationServerResponse);

  // Sets the notification server URL in the vault state and syncs it to the
  // remote vault, so it stays consistent across devices and the web vault.
  rpc SetVaultNotificationServer(SetVaultNotificationServerRequest) returns (SetVaultNotificationServerResponse);

  // Forces the daemon to reindex the entire database.
  rpc ForceReindex(ForceReindexRequest) returns (ForceReindexResponse);

  // Lists all the signing keys registered on this Daemon.
  rpc ListKeys(ListKeysRequest) returns (ListKeysResponse);

  // Deletes a key from the underlying key store.
  rpc DeleteKey(DeleteKeyRequest) returns (google.protobuf.Empty);

  // Deletes all Seed keys from the underlying key store.
  rpc DeleteAllKeys(DeleteAllKeysRequest) returns (google.protobuf.Empty);

  // Receives raw blobs to be stored.
  // The request may fail if blobs can't be recognized by the daemon.
  rpc StoreBlobs(StoreBlobsRequest) returns (StoreBlobsResponse);

  // Sign arbitrary data with an existing signing key.
  rpc SignData(SignDataRequest) returns (SignDataResponse);

  // Gets cached information about a domain.
  rpc GetDomain(GetDomainRequest) returns (DomainInfo);

  // Lists all tracked domains.
  rpc ListDomains(ListDomainsRequest) returns (ListDomainsResponse);

  // Adds a domain to be tracked.
  rpc AddDomain(AddDomainRequest) returns (DomainInfo);

  // Removes a tracked domain.
  rpc RemoveDomain(RemoveDomainRequest) returns (google.protobuf.Empty);

  // Forces a re-check of a domain's /hm/api/config endpoint.
  rpc CheckDomain(CheckDomainRequest) returns (DomainInfo);
}

// Request to generate mnemonic words.
message GenMnemonicRequest {
  // Optional. Number of mnemonic words to encode the seed.
  // Usually 12 or 24 words.
  // By default 12 words are generated.
  int32 word_count = 1;
}

// Response with the generated mnemonic.
message GenMnemonicResponse {
  // The list of human-friendly words that can be used to backup the seed. These
  // words must be stored in a secret place by the user.
  repeated string mnemonic = 1;
}

// Request to authenticate a caller key.
message AuthenticateRequest {
  // Required. Bytes of the caller key that's being authenticated.
  bytes account = 1;

  // Required. Timestamp of the request in Unix milliseconds. The daemon will check that it's not too old.
  int64 timestamp = 2;

  // Required. Signature by the caller key over the authentication payload.
  // It signs over the account ID being proven, the account ID as the request delegate,
  // the daemon peer ID as the audience, and the timestamp.
  bytes signature = 3;
}

// Response to authenticate a caller key.
message AuthenticateResponse {
  // Opaque daemon bearer token.
  string bearer_token = 1;

  // Time when the bearer token expires.
  google.protobuf.Timestamp expire_time = 2;
}

// Request to register a new account key derived from the mnemonic.
message RegisterKeyRequest {
  // Required. The list of BIP-39 mnemonic words.
  repeated string mnemonic = 1;

  // Optional. Passphrase for the seed.
  string passphrase = 2;
}

// Request to import an existing account key from a .hmkey.json file path.
message ImportKeyRequest {
  // Required. Absolute path to a .hmkey.json key export file.
  string file_path = 1;

  // Optional. Password to decrypt encrypted key exports.
  string password = 2;
}

// Request to export an existing account key to a .hmkey.json file path.
message ExportKeyRequest {
  // Required. Public key (Multikey) of the key to export.
  string public_key = 1;

  // Required. Absolute path to a .hmkey.json key export file.
  string file_path = 2;

  // Optional. Password to encrypt the exported key file.
  string password = 3;
}

// Request to get basic information about the running daemon.
message GetInfoRequest {}

// Request to get vault backend and sync status.
message GetVaultStatusRequest {
  // Optional. When true, forces an immediate sync with the remote vault.
  // Returns an error if the remote vault is not configured or offline.
  bool force_sync = 1;
}

// Request to start remote vault connection.
message StartVaultConnectionRequest {
  // Required. Remote vault base URL.
  string vault_url = 1;

  // Optional. Force replacing active or already-connected state.
  bool force = 2;
}

// Response with daemon-issued connect token metadata.
message StartVaultConnectionResponse {
  // Normalized remote vault base URL.
  string vault_url = 1;

  // Ephemeral connect token for browser-mediated daemon exchange.
  string connect_token = 2;

  // Connect token expiration time.
  google.protobuf.Timestamp expire_time = 3;
}

// Request to disconnect remote vault mode.
message DisconnectVaultRequest {
  // Optional. When true, clears local vault state after disconnecting without
  // recording account delete tombstones.
  bool clear_local_vault = 1;
}

// Request to force the syncing process.
message ForceSyncRequest {}

// Request to get the connected remote vault user's email.
message GetVaultEmailRequest {}

// Response with the connected remote vault user's email.
message GetVaultEmailResponse {
  // Current vault user email. Empty when not connected to a remote vault.
  string email = 1;
}

// Request to start a remote vault email change.
message ChangeVaultEmailStartRequest {
  // Required. The new email address to change to.
  string new_email = 1;
}

// Response after starting a remote vault email change.
message ChangeVaultEmailStartResponse {
  // Opaque anti-phishing binding to pass back to ChangeVaultEmailVerify.
  string binding = 1;

  // Time when the verification code expires.
  google.protobuf.Timestamp expire_time = 2;

  // Time after which a new code may be requested.
  google.protobuf.Timestamp resend_allowed_time = 3;
}

// Request to verify and complete a remote vault email change.
message ChangeVaultEmailVerifyRequest {
  // Required. The verification code emailed to the new address.
  string code = 1;

  // Required. The binding returned by ChangeVaultEmailStart.
  string binding = 2;
}

// Response after completing a remote vault email change.
message ChangeVaultEmailVerifyResponse {
  // The new, now-active vault user email.
  string new_email = 1;
}

// Request for the remote vault master-password status.
message GetVaultPasswordStatusRequest {}

// Response with the remote vault master-password status.
message GetVaultPasswordStatusResponse {
  // True when the vault user already has a master password credential.
  bool is_set = 1;
}

// Request to set or change the remote vault master password.
message SetVaultMasterPasswordRequest {
  // Required. The new master password (plaintext; used by the daemon to derive
  // the credential locally and never sent to the vault server).
  string password = 1;
}

// Response after setting or changing the remote vault master password.
message SetVaultMasterPasswordResponse {}

// Request for the vault notification server URL.
message GetVaultNotificationServerRequest {}

// Response with the vault notification server URL.
message GetVaultNotificationServerResponse {
  // The notification server URL from the vault state. Empty when using the default.
  string url = 1;
}

// Request to set the vault notification server URL.
message SetVaultNotificationServerRequest {
  // The notification server URL to store in the vault state. Empty uses the default.
  string url = 1;
}

// Response after setting the vault notification server URL.
message SetVaultNotificationServerResponse {}

// Request to force reindexing of the entire database.
message ForceReindexRequest {}

// Response after forcing reindexing.
message ForceReindexResponse {}

// Request to delete all keys.
message DeleteAllKeysRequest {}

// Request to list signing keys.
message ListKeysRequest {}

// Response with the list of registered signing keys.
message ListKeysResponse {
  // List of registered keys.
  repeated NamedKey keys = 1;
}

// Request to delete an existing key.
message DeleteKeyRequest {
  // Public key (Multikey) of the key to delete.
  string public_key = 1;
}

// Request to store blobs.
message StoreBlobsRequest {
  // Required. List of blobs to be stored.
  // The request is atomic: either all blobs are stored or none of them.
  repeated Blob blobs = 1;
}

// Response after storing blobs.
message StoreBlobsResponse {
  // List of CIDs for the stored blobs.
  // The order is the same as in the request.
  repeated string cids = 1;
}

// Request to sign data.
message SignDataRequest {
  // Required. Public key (Multikey) of the signing key to use for signing.
  string signing_key = 1;

  // Required. Data to be signed.
  bytes data = 2;
}

// Response for signing data.
message SignDataResponse {
  // Signature over the data.
  bytes signature = 1;
}

// Address information about a single peer.
message AddrInfo {
  string peer_id = 1;

  repeated string addrs = 2;
}

// Raw blob to be stored.
message Blob {
  // Optional. The client can provide a CID for the blob (the server will verify it).
  // If not provided, the data is assumed to be DAG-CBOR encoded, and the server will generate a CID
  // using its default hash function.
  string cid = 1;

  // Required. Raw data of the blob.
  bytes data = 2;
}

// Info is a generic information about the running node.
message Info {
  // Current state of the daemon.
  State state = 1;

  // Libp2p Peer ID of this node.
  string peer_id = 2;

  // Start time of the node.
  google.protobuf.Timestamp start_time = 3;

  // The libp2p protocol ID that the daemon is using.
  string protocol_id = 4;

  // The tasks that the daemon is currently performing.
  repeated Task tasks = 5;
}

// State describes various states of the daemon.
enum State {
  // Daemon in starting up and it not ready to use yet.
  STARTING = 0;

  // Daemon is running a data migration, which may take a while.
  // Callers should poll and wait until the daemon becomes ACTIVE.
  MIGRATING = 1;

  // Daemon is active and ready to use.
  ACTIVE = 3;
}

// VaultBackendMode describes the daemon vault backend mode.
enum VaultBackendMode {
  // Unknown backend mode.
  VAULT_BACKEND_MODE_UNSPECIFIED = 0;

  // Local encrypted vault file only.
  VAULT_BACKEND_MODE_LOCAL = 1;

  // Local encrypted vault file with remote sync enabled.
  VAULT_BACKEND_MODE_REMOTE = 2;
}

// VaultConnectionStatus describes remote connection status for daemon vault sync.
enum VaultConnectionStatus {
  // Unknown connection status.
  VAULT_CONNECTION_STATUS_UNSPECIFIED = 0;

  // Remote vault sync is not connected.
  VAULT_CONNECTION_STATUS_DISCONNECTED = 1;

  // Remote vault sync is connected.
  VAULT_CONNECTION_STATUS_CONNECTED = 2;
}

// VaultSyncStatus describes daemon sync metadata for vault state.
message VaultSyncStatus {
  // Last local vault version known by the daemon.
  int64 local_version = 1;

  // Last remote vault version observed by the daemon.
  int64 remote_version = 2;

  // Last successful or attempted sync time.
  google.protobuf.Timestamp last_sync_time = 3;

  // Last sync error message, when sync failed.
  string last_sync_error = 4;
}

// Response with daemon vault backend mode, remote status, and sync metadata.
message GetVaultStatusResponse {
  // Current daemon vault backend mode.
  VaultBackendMode backend_mode = 1;

  // Current remote connection status.
  VaultConnectionStatus connection_status = 2;

  // Remote vault URL when in remote mode.
  string remote_vault_url = 3;

  // Sync status metadata.
  VaultSyncStatus sync_status = 4;
}

// Different types of tasks that the daemon can perform.
enum TaskName {
  // Unknown task.
  TASK_NAME_UNSPECIFIED = 0;

  // Task for reindexing the database.
  REINDEXING = 1;

  // Task for generating embeddings.
  EMBEDDING = 2;

  // Task for loading a machine learning model.
  LOADING_MODEL = 3;
}

// Description of a task that the daemon is performing.
message Task {
  // Name of the task.
  TaskName task_name = 1;

  // Description of the task.
  string description = 2;

  // Total amount of work for the task.
  int64 total = 3;

  // Amount of work completed. Always less than or equal to total.
  int64 completed = 4;
}

// Signing key with an internal name.
message NamedKey {
  // Public key in Multikey format. This is the sole identifier for a key.
  // https://www.w3.org/TR/vc-data-integrity/#multikey.
  string public_key = 1;
}

// Request to get domain info.
message GetDomainRequest {
  // Required. The domain name (e.g. "hyper.media").
  string domain = 1;
}

// Request to list tracked domains.
message ListDomainsRequest {}

// Response with the list of tracked domains.
message ListDomainsResponse {
  // List of tracked domains.
  repeated DomainInfo domains = 1;
}

// Request to add a domain to track.
message AddDomainRequest {
  // Required. The domain name (e.g. "hyper.media").
  string domain = 1;
}

// Request to remove a tracked domain.
message RemoveDomainRequest {
  // Required. The domain name to remove.
  string domain = 1;
}

// Request to force a re-check of a domain.
message CheckDomainRequest {
  // Required. The domain name to check.
  string domain = 1;
}

// Information about a tracked domain.
message DomainInfo {
  // The domain name.
  string domain = 1;

  // Timestamp of the last check.
  google.protobuf.Timestamp last_check = 2;

  // Status of the last check: "success", "unreachable", "error", or "unknown".
  string status = 3;

  // Timestamp of the last successful check.
  google.protobuf.Timestamp last_success = 4;

  // The registered account UID from the domain's config.
  string registered_account_uid = 5;

  // The peer ID of the domain's node.
  string peer_id = 6;

  // Error details from the last failed check.
  string last_error = 7;
}
